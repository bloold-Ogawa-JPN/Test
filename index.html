<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>時報テスト</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>時報テスト</h1>

  <p>ボタンを押すと「57,58,59,00秒」の時報パターンを再生します。</p>

  <div>
    <button onclick="playChime('electronic')">電子音（時報サービス風）</button>
    <button onclick="playChime('bell')">鐘の音（時報サービス風）</button>
    <button onclick="playChime('retro')">レトロ（square・時報サービス風）</button>
  </div>

  <script src="test-chime.js"></script>
</body>
</html>
